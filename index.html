<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Тренировки">
<title>Тренировки</title>
<style>
:root{--blue:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9f0a;--bg:#f2f2f7;--card:#fff;--bdr:rgba(0,0,0,.1);--text:#1c1c1e;--muted:#8e8e93;--r:14px;--rsm:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100%;overflow-x:hidden;-webkit-text-size-adjust:100%}
.screen{display:none;width:100%;min-height:100vh;padding-bottom:90px}
.screen.active{display:block}
/* Header */
.hdr{background:var(--card);padding:max(12px,env(safe-area-inset-top,12px)) 16px 10px;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:20}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr h1{font-size:19px;font-weight:700;letter-spacing:-.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:3px}
.back{font-size:15px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:600;min-width:44px;min-height:44px;display:flex;align-items:center;padding:0 4px 0 0;flex-shrink:0;white-space:nowrap}
/* Layout */
.pad{padding:12px}
.card{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--bdr)}
/* Buttons */
.btn{width:100%;height:52px;border-radius:var(--r);font-size:16px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-appearance:none}
.btn+.btn,.btn+.btn-o{margin-top:8px}
.btn-o{width:100%;height:52px;border-radius:var(--r);font-size:16px;font-weight:700;border:2px solid var(--blue);background:none;color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:8px;-webkit-appearance:none}
.btn-o.red{border-color:var(--red);color:var(--red)}
.btn:active,.btn-o:active{opacity:.75;transform:scale(.98)}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:rgba(0,0,0,.07);color:var(--text)}
/* Small buttons */
.bsm{font-size:13px;padding:0 12px;height:38px;border-radius:9px;font-weight:700;border:2px solid var(--blue);background:none;color:var(--blue);cursor:pointer;display:inline-flex;align-items:center;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.bsm.r{border-color:var(--red);color:var(--red)}
.bsm.g{border-color:var(--green);color:var(--green)}
.bsm:active{opacity:.7}
/* Inputs */
input,select{width:100%;padding:0 13px;height:48px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--bg);font-size:16px;font-family:inherit;color:var(--text);outline:none;-webkit-appearance:none;display:block}
input:focus,select:focus{border-color:var(--blue);background:#fff}
.lbl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Section title */
.stitle{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 12px 6px}
/* Template list */
.ti{background:var(--card);border-radius:var(--r);padding:14px;margin:0 12px 10px;border:1px solid var(--bdr);display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-user-select:none}
.ti:active{background:#f0f0f5}
.tic{width:48px;height:48px;border-radius:12px;background:rgba(0,122,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
/* Exercise card in editor */
.excard{background:var(--bg);border-radius:var(--rsm);padding:12px;margin-bottom:8px;border:1px solid var(--bdr)}
/* Weight control */
.wbig{font-size:52px;font-weight:700;letter-spacing:-2px;line-height:1}
.wunit{font-size:17px;color:var(--muted)}
.wbtns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:10px}
.wbtn{height:50px;border-radius:10px;background:var(--bg);border:1px solid var(--bdr);font-size:14px;font-weight:700;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.wbtn:active{background:#e5e5ea;transform:scale(.92)}
/* Sets */
.srow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.srow:last-child{border-bottom:none;padding-bottom:0}
.snum{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;margin-right:4px;display:inline-block}
.bwarm{background:rgba(255,159,10,.15);color:#9a5600}
.bwork{background:rgba(0,122,255,.12);color:#004fb5}
/* Progress */
.pbar{height:4px;background:rgba(0,0,0,.1);border-radius:2px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
.ptext{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
/* Timer overlay */
.tov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px}
.tcircle{width:180px;height:180px;border-radius:50%;border:4px solid var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1c1c1e}
.tnum{font-size:56px;font-weight:700;color:#fff;letter-spacing:-2px;line-height:1}
.tlbl{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px}
.tskip{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;padding:14px 36px;border-radius:14px;cursor:pointer;font-weight:700}
/* Bottom sheet */
.sheetwrap{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:flex;align-items:flex-end}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 14px max(32px,calc(env(safe-area-inset-bottom,0px) + 20px));width:100%;max-height:82vh;overflow-y:auto}
.shandle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 14px}
/* Summary grid */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.scard{background:var(--bg);border-radius:var(--rsm);padding:12px;text-align:center}
.sval{font-size:26px;font-weight:700;color:var(--blue)}
.slbl{font-size:12px;color:var(--muted);margin-top:2px}
/* Next exercise */
.nxi{background:var(--bg);border-radius:var(--rsm);padding:13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;border:2px solid transparent}
.nxi.sel{border-color:var(--blue);background:rgba(0,122,255,.04)}
/* Stats */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.statc{background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--bdr)}
.statv{font-size:26px;font-weight:700;color:var(--blue)}
.statl{font-size:12px;color:var(--muted);margin-top:2px}
/* Rest button */
.restbtn{width:100%;height:46px;border-radius:var(--rsm);background:var(--bg);border:1px solid var(--bdr);cursor:pointer;font-size:14px;font-weight:700;color:var(--muted);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none}
.restbtn:active{background:#e5e5ea}
/* Set input block */
.setinp{background:rgba(0,122,255,.05);border-radius:var(--rsm);padding:13px;border:1px solid rgba(0,122,255,.2);margin-top:8px}
/* Sticky bottom button */
.stickyb{position:sticky;bottom:0;background:var(--bg);padding:12px;border-top:1px solid var(--bdr)}
/* Tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1px solid var(--bdr);display:flex;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:30}
.tab{flex:1;padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;min-height:56px;-webkit-appearance:none}
.tab-icon{font-size:22px;line-height:1}
.tab-lbl{font-size:10px;color:var(--muted);font-weight:700}
.tab.active .tab-lbl{color:var(--blue)}
.empty{text-align:center;padding:36px 16px;color:var(--muted)}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="hdr">
    <div class="hdr-row"><h1>Тренировки</h1><button class="bsm" onclick="openCreateTmpl()">+ Шаблон</button></div>
    <div class="hdr-sub" id="home-date"></div>
  </div>
  <div id="tmpl-list" style="padding-top:4px"></div>
  <div class="stitle">Последние тренировки</div>
  <div id="home-history"></div>
  <div class="tabbar">
    <button class="tab active" id="tab-h" onclick="goHome()"><span class="tab-icon">🏠</span><span class="tab-lbl">Главная</span></button>
    <button class="tab" id="tab-s" onclick="openStats()"><span class="tab-icon">📊</span><span class="tab-lbl">Статистика</span></button>
  </div>
</div>

<!-- CREATE TEMPLATE -->
<div class="screen" id="s-create-tmpl">
  <div class="hdr">
    <div class="hdr-row">
      <button class="back" onclick="goHome()">← Назад</button>
      <h1 id="tmpl-editor-title">Новый шаблон</h1>
      <button class="bsm" onclick="saveTmpl()">Сохранить</button>
    </div>
  </div>
  <div class="pad">
    <div class="card">
      <label class="lbl">Название</label>
      <input id="tmpl-name" placeholder="Тяни, Жми, Ноги..." maxlength="30" style="margin-bottom:12px">
      <label class="lbl">Иконка</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="icon-picker">
        <span class="iopt" onclick="pickIcon(this)" style="font-size:22px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid var(--blue)">💪</span>
        <span class="iopt" onclick="pickIcon(this)" style="font-size:22px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent">🏋️</span>
        <span class="iopt" onclick="pickIcon(this)" style="font-size:22px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent">🦵</span>
        <span class="iopt" onclick="pickIcon(this)" style="font-size:22px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent">🤸</span>
        <span class="iopt" onclick="pickIcon(this)" style="font-size:22px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent">🏃</span>
        <span class="iopt" onclick="pickIcon(this)" style="font-size:22px;cursor:pointer;padding:8px;border-radius:10px;border:2px solid transparent">🔥</span>
      </div>
    </div>
    <div class="stitle" style="padding:4px 0 6px">Упражнения</div>
    <div id="tmpl-ex-list"></div>
    <div class="card">
      <label class="lbl">Добавить упражнение</label>
      <select id="new-ex" style="margin-bottom:10px">
        <option value="">Выбрать...</option>
        <option>Становая тяга</option><option>Тяга к поясу</option><option>Тяга гантели</option>
        <option>Подтягивания</option><option>Горизонтальная тяга</option><option>Шраги</option>
        <option>Жим лёжа</option><option>Жим стоя</option><option>Разводка</option>
        <option>Приседания</option><option>Выпады</option><option>Жим ногами</option>
        <option>Бицепс со штангой</option><option>Молоток</option><option>Трицепс на блоке</option>
        <option>Планка</option><option>Пресс</option><option>Бег</option>
      </select>
      <div class="g3" style="margin-bottom:10px">
        <div><label class="lbl">Подходы</label><input type="number" id="ns" placeholder="4" min="1" max="10" inputmode="numeric"></div>
        <div><label class="lbl">Повторы</label><input type="number" id="nr" placeholder="8" min="1" max="50" inputmode="numeric"></div>
        <div><label class="lbl">Вес кг</label><input type="number" id="nw" placeholder="0" min="0" step="2.5" inputmode="decimal"></div>
      </div>
      <button class="btn btn-blue" style="height:48px;font-size:15px" onclick="addExToTmpl()">+ Добавить</button>
    </div>
  </div>
</div>

<!-- PRE-START -->
<div class="screen" id="s-prestart">
  <div class="hdr">
    <div class="hdr-row">
      <button class="back" onclick="goHome()">← Назад</button>
      <h1 id="prestart-title"></h1>
      <span style="min-width:44px"></span>
    </div>
    <div class="hdr-sub">Укажи веса на сегодня</div>
  </div>
  <div class="pad" id="prestart-list"></div>
  <div class="stickyb">
    <button class="btn btn-green" onclick="startWorkout()">Начать тренировку →</button>
  </div>
</div>

<!-- ACTIVE EXERCISE -->
<div class="screen" id="s-exercise">
  <div class="hdr">
    <div class="hdr-row">
      <button class="back" style="color:var(--red)" onclick="confirmExit()">✕ Стоп</button>
      <div style="flex:1;text-align:center;padding:0 4px;min-width:0">
        <div class="ptext" id="prog-text"></div>
        <div class="pbar"><div class="pfill" id="prog-fill"></div></div>
      </div>
      <span style="min-width:56px"></span>
    </div>
  </div>
  <div class="pad">
    <div style="text-align:center;padding:14px 0 10px">
      <div style="font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px" id="ex-name"></div>
      <div style="display:inline-block;background:var(--bg);border-radius:8px;padding:5px 12px;font-size:13px;color:var(--muted);font-weight:600" id="ex-prev"></div>
    </div>
    <div class="card" style="text-align:center">
      <label class="lbl" style="text-align:center;margin-bottom:8px">Рабочий вес</label>
      <div><span class="wbig" id="ex-weight">60</span><span class="wunit"> кг</span></div>
      <div class="wbtns">
        <button class="wbtn" onclick="adj(-5)">−5</button>
        <button class="wbtn" onclick="adj(-2.5)">−2.5</button>
        <button class="wbtn" onclick="adj(2.5)">+2.5</button>
        <button class="wbtn" onclick="adj(5)">+5</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <span style="font-size:15px;font-weight:700">Подходы</span>
        <div style="display:flex;gap:8px">
          <button class="bsm" onclick="openSetForm('warm')">+ Разминка</button>
          <button class="bsm g" onclick="openSetForm('work')">+ Рабочий</button>
        </div>
      </div>
      <div id="sets-list"><div style="color:var(--muted);font-size:14px;text-align:center;padding:10px">Нажми кнопку выше</div></div>
      <div id="set-form" style="display:none">
        <div class="setinp">
          <div class="g2" style="margin-bottom:10px">
            <div><label class="lbl">Повторы</label><input type="number" id="sri" placeholder="8" min="1" max="50" inputmode="numeric"></div>
            <div><label class="lbl">Вес (кг)</label><input type="number" id="swi" placeholder="60" min="0" step="2.5" inputmode="decimal"></div>
          </div>
          <button class="btn btn-green" style="height:48px" onclick="completeSet()">✓ Подход выполнен</button>
          <button class="btn btn-gray" style="height:44px;font-size:14px;margin-top:8px" onclick="cancelSet()">Отмена</button>
        </div>
      </div>
    </div>
    <button class="btn btn-blue" onclick="finishEx()">Завершить упражнение →</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="skipEx()">Пропустить</button>
  </div>
</div>

<!-- BETWEEN EXERCISES -->
<div class="screen" id="s-next">
  <div class="hdr"><div class="hdr-row"><span></span><h1>Дальше</h1><span></span></div></div>
  <div class="pad">
    <div class="card" id="prev-sum"></div>
    <div class="stitle" style="padding:10px 0 6px">Следующее упражнение</div>
    <div id="next-opts"></div>
    <button class="btn btn-gray" style="margin-bottom:8px" onclick="openAddSheet()">+ Добавить другое упражнение</button>
    <button class="btn btn-green" id="start-next" onclick="doNext()">Начать →</button>
    <div class="btn-o red" onclick="finishFull()" style="cursor:pointer">Завершить тренировку</div>
  </div>
</div>

<!-- SUMMARY -->
<div class="screen" id="s-summary">
  <div class="hdr"><h1>Итоги 🎉</h1></div>
  <div class="pad" id="sum-content"></div>
</div>

<!-- STATS -->
<div class="screen" id="s-stats">
  <div class="hdr">
    <div class="hdr-row"><button class="back" onclick="goHome()">← Назад</button><h1>Статистика</h1><span style="min-width:44px"></span></div>
  </div>
  <div class="pad" id="stats-content"></div>
  <div class="tabbar">
    <button class="tab" onclick="goHome()"><span class="tab-icon">🏠</span><span class="tab-lbl">Главная</span></button>
    <button class="tab active" onclick="openStats()"><span class="tab-icon">📊</span><span class="tab-lbl">Статистика</span></button>
  </div>
</div>

<!-- TIMER -->
<div class="tov" id="tov" style="display:none">
  <div class="tcircle"><div class="tnum" id="tnum">90</div><div class="tlbl">отдых</div></div>
  <button class="tskip" onclick="skipTimer()">Пропустить →</button>
</div>

<!-- ADD DURING WORKOUT SHEET -->
<div class="sheetwrap" id="add-sheet" style="display:none" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="shandle"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:14px">Добавить упражнение</div>
    <label class="lbl">Упражнение</label>
    <select id="sh-ex" style="margin-bottom:10px">
      <option value="">Выбрать...</option>
      <option>Становая тяга</option><option>Тяга к поясу</option><option>Тяга гантели</option>
      <option>Подтягивания</option><option>Горизонтальная тяга</option><option>Шраги</option>
      <option>Жим лёжа</option><option>Жим стоя</option><option>Разводка</option>
      <option>Приседания</option><option>Выпады</option><option>Жим ногами</option>
      <option>Бицепс со штангой</option><option>Молоток</option><option>Трицепс на блоке</option>
      <option>Планка</option><option>Пресс</option><option>Бег</option>
    </select>
    <div class="g3" style="margin-bottom:12px">
      <div><label class="lbl">Подходы</label><input type="number" id="sh-s" placeholder="3" inputmode="numeric"></div>
      <div><label class="lbl">Повторы</label><input type="number" id="sh-r" placeholder="10" inputmode="numeric"></div>
      <div><label class="lbl">Вес кг</label><input type="number" id="sh-w" placeholder="0" inputmode="decimal"></div>
    </div>
    <button class="btn btn-blue" onclick="confirmAdd()">Добавить</button>
  </div>
</div>

<script>
var T=JSON.parse(localStorage.getItem('wt6t')||'[]');
var H=JSON.parse(localStorage.getItem('wt6h')||'[]');
var editId=null,selIcon='💪',tmplEx=[];
var curTmpl=null,tw={},ses=null;
var timerInt=null,setPend=null,nextIdx=null,timerRemain=0;
var EI={'Становая тяга':'🏋️','Тяга к поясу':'💪','Тяга гантели':'💪','Подтягивания':'🤸','Горизонтальная тяга':'🔗','Шраги':'🦾','Жим лёжа':'🏋️','Жим стоя':'🏋️','Разводка':'🦋','Приседания':'🦵','Выпады':'🦵','Жим ногами':'🦵','Бицепс со штангой':'💪','Молоток':'🔨','Трицепс на блоке':'💪','Планка':'⏱️','Пресс':'🔥','Бег':'🏃'};
var MN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
var DN=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
var FN=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

function sv(){localStorage.setItem('wt6t',JSON.stringify(T));localStorage.setItem('wt6h',JSON.stringify(H));}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function ei(n){return EI[n]||'🏋️';}
function fd(d){var dt=new Date(d);return DN[dt.getDay()]+' '+dt.getDate()+' '+MN[dt.getMonth()];}

function goHome(){
  var now=new Date();
  document.getElementById('home-date').textContent=FN[now.getDay()]+', '+now.getDate()+' '+MN[now.getMonth()];
  var tl=document.getElementById('tmpl-list');
  if(!T.length){tl.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px">Нет шаблонов</div><div>Создай первый шаблон</div></div>';}
  else{
    tl.innerHTML='<div class="stitle">Шаблоны</div>'+T.map(function(t){
      var last=H.find(function(h){return h.tmplId===t.id;});
      return '<div class="ti" onclick="openPrestart(\''+t.id+'\')"><div class="tic">'+t.icon+'</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.name+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+(last?'Последний: '+fd(last.date):t.exercises.length+' упр.')+'</div></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="bsm" style="font-size:12px;padding:0 10px;height:36px" onclick="event.stopPropagation();editTmpl(\''+t.id+'\')">✎</button><button class="bsm r" style="font-size:12px;padding:0 10px;height:36px" onclick="event.stopPropagation();delTmpl(\''+t.id+'\')">✕</button></div></div>';
    }).join('');
  }
  var hl=document.getElementById('home-history');
  if(!H.length){hl.innerHTML='<div style="color:var(--muted);font-size:14px;text-align:center;padding:16px">Нет завершённых тренировок</div>';}
  else{
    hl.innerHTML=H.slice(0,3).map(function(w){
      var exBadges=w.exercises.filter(function(e){return !e.skipped;}).map(function(e){return '<span class="badge bwork">'+e.name+'</span>';}).join('');
      return '<div style="background:var(--card);border-radius:var(--r);padding:14px;margin:0 12px 10px;border:1px solid var(--bdr)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px"><div style="min-width:0"><div style="font-weight:700;font-size:15px">'+w.tmplName+'</div><div style="font-size:12px;color:var(--muted);margin-top:2px">'+fd(w.date)+' · '+w.duration+' мин · '+w.exercises.filter(function(e){return !e.skipped;}).length+' упр.</div></div><button class="bsm r" style="font-size:11px;padding:0 8px;height:30px;flex-shrink:0" onclick="delH(\''+w.id+'\')">✕</button></div><div style="display:flex;flex-wrap:wrap;gap:4px">'+exBadges+'</div></div>';
    }).join('');
  }
  show('s-home');
}

function delTmpl(id){if(!confirm('Удалить шаблон?'))return;T=T.filter(function(t){return t.id!==id;});sv();goHome();}
function delH(id){if(!confirm('Удалить запись?'))return;H=H.filter(function(h){return h.id!==id;});sv();goHome();}

function openCreateTmpl(){editId=null;tmplEx=[];selIcon='💪';document.getElementById('tmpl-name').value='';document.getElementById('tmpl-editor-title').textContent='Новый шаблон';document.querySelectorAll('.iopt').forEach(function(o,i){o.style.border=i===0?'2px solid var(--blue)':'2px solid transparent';});renderTEx();show('s-create-tmpl');}
function editTmpl(id){var t=T.find(function(x){return x.id===id;});editId=id;tmplEx=t.exercises.slice();selIcon=t.icon;document.getElementById('tmpl-name').value=t.name;document.getElementById('tmpl-editor-title').textContent='Редактировать';document.querySelectorAll('.iopt').forEach(function(o){o.style.border=o.textContent===t.icon?'2px solid var(--blue)':'2px solid transparent';});renderTEx();show('s-create-tmpl');}

function renderTEx(){
  document.getElementById('tmpl-ex-list').innerHTML=tmplEx.map(function(ex,i){
    return '<div class="excard"><div style="display:flex;align-items:center;justify-content:space-between"><span style="font-weight:700;font-size:14px">'+ei(ex.name)+' '+ex.name+'</span><button class="bsm r" style="font-size:11px;padding:0 8px;height:30px" onclick="rmTEx('+i+')">✕</button></div><div style="font-size:13px;color:var(--muted);margin-top:4px">'+ex.sets+'×'+ex.reps+(ex.weight?' · '+ex.weight+' кг':'')+'</div></div>';
  }).join('');
}

function addExToTmpl(){
  var name=document.getElementById('new-ex').value;
  if(!name){alert('Выберите упражнение');return;}
  tmplEx.push({name:name,sets:parseInt(document.getElementById('ns').value)||4,reps:parseInt(document.getElementById('nr').value)||8,weight:parseFloat(document.getElementById('nw').value)||0});
  document.getElementById('new-ex').value='';document.getElementById('ns').value='';document.getElementById('nr').value='';document.getElementById('nw').value='';
  renderTEx();
}
function rmTEx(i){tmplEx.splice(i,1);renderTEx();}
function pickIcon(el){document.querySelectorAll('.iopt').forEach(function(o){o.style.border='2px solid transparent';});el.style.border='2px solid var(--blue)';selIcon=el.textContent;}
function saveTmpl(){
  var name=document.getElementById('tmpl-name').value.trim();
  if(!name){alert('Введи название');return;}
  if(!tmplEx.length){alert('Добавь упражнение');return;}
  if(editId){var i=T.findIndex(function(t){return t.id===editId;});T[i]=Object.assign({},T[i],{name:name,icon:selIcon,exercises:tmplEx.slice()});}
  else T.push({id:'t'+Date.now(),name:name,icon:selIcon,exercises:tmplEx.slice()});
  sv();goHome();
}

function openPrestart(tmplId){
  curTmpl=T.find(function(t){return t.id===tmplId;});
  document.getElementById('prestart-title').textContent=curTmpl.icon+' '+curTmpl.name;
  var last=H.find(function(h){return h.tmplId===tmplId;});
  tw={};
  document.getElementById('prestart-list').innerHTML=curTmpl.exercises.map(function(ex,i){
    var le=last?last.exercises.find(function(e){return e.name===ex.name;}):null;
    tw[i]=le?le.weight:ex.weight;
    var prevStr=le?('Прошлый: '+(le.workSets||le.sets)+'×'+le.reps+' · '+le.weight+' кг'):'Первый раз';
    return '<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="font-size:24px;flex-shrink:0">'+ei(ex.name)+'</div><div style="min-width:0"><div style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ex.name+'</div><div style="font-size:12px;color:var(--muted)">'+prevStr+'</div></div></div><label class="lbl">Вес сегодня (кг)</label><input type="number" id="tw-'+i+'" value="'+tw[i]+'" min="0" step="2.5" inputmode="decimal" oninput="tw['+i+']=parseFloat(this.value)||0"></div>';
  }).join('');
  show('s-prestart');
}

function startWorkout(){
  curTmpl.exercises.forEach(function(_,i){var el=document.getElementById('tw-'+i);if(el)tw[i]=parseFloat(el.value)||0;});
  ses={tmplId:curTmpl.id,tmplName:curTmpl.name,startTime:Date.now(),exercises:[],curSets:[],curW:0,extra:[]};
  launch(0);
}

function allEx(){return curTmpl.exercises.concat(ses.extra);}

function launch(idx){
  ses.exIdx=idx;ses.curSets=[];setPend=null;
  var ae=allEx();var ex=ae[idx];
  document.getElementById('ex-name').textContent=ei(ex.name)+' '+ex.name;
  var last=H.find(function(h){return h.tmplId===ses.tmplId;});
  var le=last?last.exercises.find(function(e){return e.name===ex.name;}):null;
  document.getElementById('ex-prev').textContent=le?('Прошлый: '+(le.workSets||le.sets)+'×'+le.reps+' · '+le.weight+' кг'):'Первый раз';
  var w=tw[idx]!==undefined?tw[idx]:(ex.weight||0);
  ses.curW=w;document.getElementById('ex-weight').textContent=w;
  var total=ae.length;
  document.getElementById('prog-text').textContent=(idx+1)+' из '+total;
  document.getElementById('prog-fill').style.width=Math.round((idx/total)*100)+'%';
  document.getElementById('sets-list').innerHTML='<div style="color:var(--muted);font-size:14px;text-align:center;padding:10px">Нажми кнопку выше</div>';
  document.getElementById('set-form').style.display='none';
  var rb=document.getElementById('rb');if(rb)rb.remove();
  show('s-exercise');
}

function adj(d){ses.curW=Math.max(0,Math.round((ses.curW+d)*2)/2);document.getElementById('ex-weight').textContent=ses.curW;}

function openSetForm(type){
  setPend=type;
  var ex=allEx()[ses.exIdx];
  document.getElementById('sri').value=ex.reps||8;
  document.getElementById('swi').value=type==='warm'?Math.round(ses.curW*.6/2.5)*2.5:ses.curW;
  document.getElementById('set-form').style.display='block';
  document.getElementById('sri').focus();
}
function cancelSet(){document.getElementById('set-form').style.display='none';setPend=null;}

function completeSet(){
  var reps=parseInt(document.getElementById('sri').value)||8;
  var weight=parseFloat(document.getElementById('swi').value)||ses.curW;
  ses.curSets.push({type:setPend,reps:reps,weight:weight});
  document.getElementById('set-form').style.display='none';setPend=null;
  renderSets();
  var rb=document.getElementById('rb');if(rb)rb.remove();
  var lastSet=ses.curSets[ses.curSets.length-1];
  var btn=document.createElement('button');
  btn.id='rb';btn.className='restbtn';
  btn.innerHTML='⏱ Запустить отдых';
  btn.onclick=function(){btn.remove();startTimer(lastSet.type==='warm'?60:90);};
  document.getElementById('sets-list').after(btn);
}

function renderSets(){
  var list=document.getElementById('sets-list');
  if(!ses.curSets.length){list.innerHTML='<div style="color:var(--muted);font-size:14px;text-align:center;padding:10px">Нажми кнопку выше</div>';return;}
  list.innerHTML=ses.curSets.map(function(s,i){
    var bg=s.type==='warm'?'rgba(255,159,10,.15)':'rgba(52,199,89,.15)';
    var col=s.type==='warm'?'#9a5600':'#1a7a36';
    var bc=s.type==='warm'?'bwarm':'bwork';
    var bl=s.type==='warm'?'Разм.':'Раб.';
    return '<div class="srow"><div class="snum" style="background:'+bg+';color:'+col+'">'+(i+1)+'</div><div style="flex:1;font-size:14px;min-width:0"><span class="badge '+bc+'">'+bl+'</span>'+s.reps+' повт · '+s.weight+' кг</div><button class="bsm r" style="font-size:11px;padding:0 8px;height:30px" onclick="rmSet('+i+')">✕</button></div>';
  }).join('');
}
function rmSet(i){ses.curSets.splice(i,1);renderSets();}

function finishEx(){
  var ws=ses.curSets.filter(function(s){return s.type==='work';});
  var wms=ses.curSets.filter(function(s){return s.type==='warm';});
  var ex=allEx()[ses.exIdx];
  var avgReps=ws.length?Math.round(ws.reduce(function(a,s){return a+s.reps;},0)/ws.length):0;
  ses.exercises.push({name:ex.name,weight:ses.curW,sets:ses.curSets.length,workSets:ws.length,warmSets:wms.length,reps:avgReps,allSets:ses.curSets.slice()});
  showNext();
}
function skipEx(){
  var ex=allEx()[ses.exIdx];
  ses.exercises.push({name:ex.name,weight:0,sets:0,workSets:0,warmSets:0,reps:0,allSets:[],skipped:true});
  showNext();
}
function confirmExit(){if(confirm('Выйти? Прогресс не сохранится.'))goHome();}

function showNext(){
  var done=ses.exercises.length;
  var prev=ses.exercises[done-1];
  var ws=prev.allSets?prev.allSets.filter(function(s){return s.type==='work';}):[];
  var sum='<div style="font-size:16px;font-weight:700;margin-bottom:10px">'+ei(prev.name)+' '+prev.name+'</div>';
  if(prev.skipped)sum+='<div style="color:var(--muted);font-size:14px">Пропущено</div>';
  else{
    sum+='<div class="sgrid"><div class="scard"><div class="sval">'+prev.workSets+'</div><div class="slbl">рабочих</div></div><div class="scard"><div class="sval">'+prev.warmSets+'</div><div class="slbl">разминочных</div></div></div>';
    if(ws.length)sum+='<div style="font-size:13px;color:var(--muted)">'+ws.map(function(s){return s.reps+'×'+s.weight+'кг';}).join(' / ')+'</div>';
  }
  document.getElementById('prev-sum').innerHTML=sum;
  var ae=allEx();var rem=ae.slice(done);
  nextIdx=rem.length>0?done:null;
  if(!rem.length){
    document.getElementById('next-opts').innerHTML='<div style="color:var(--green);font-weight:700;font-size:15px;text-align:center;padding:16px">✓ Все упражнения выполнены!</div>';
    document.getElementById('start-next').style.display='none';
  } else {
    document.getElementById('start-next').style.display='flex';
    document.getElementById('next-opts').innerHTML=rem.map(function(ex,i){
      var idx2=done+i;
      var w=tw[ae.indexOf(ex)]!==undefined?tw[ae.indexOf(ex)]:ex.weight;
      return '<div class="nxi '+(i===0?'sel':'')+'" onclick="selNext(this,'+idx2+')"><div style="font-size:22px;flex-shrink:0">'+ei(ex.name)+'</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ex.name+'</div><div style="font-size:12px;color:var(--muted)">'+ex.sets+'×'+ex.reps+(w?' · '+w+' кг':'')+'</div></div>'+(i===0?'<span style="font-size:11px;background:var(--blue);color:#fff;border-radius:6px;padding:3px 8px;flex-shrink:0">Следующий</span>':'')+'</div>';
    }).join('');
  }
  show('s-next');
}

function selNext(el,idx){document.querySelectorAll('.nxi').forEach(function(e){e.classList.remove('sel');});el.classList.add('sel');nextIdx=idx;}
function doNext(){if(nextIdx!==null)launch(nextIdx);}

function openAddSheet(){document.getElementById('add-sheet').style.display='flex';}
function closeSheet(e){if(e.target===document.getElementById('add-sheet'))document.getElementById('add-sheet').style.display='none';}
function confirmAdd(){
  var name=document.getElementById('sh-ex').value;if(!name){alert('Выберите упражнение');return;}
  var ex={name:name,sets:parseInt(document.getElementById('sh-s').value)||3,reps:parseInt(document.getElementById('sh-r').value)||10,weight:parseFloat(document.getElementById('sh-w').value)||0};
  ses.extra.push(ex);
  tw[allEx().length-1]=ex.weight;
  document.getElementById('add-sheet').style.display='none';
  ['sh-ex','sh-s','sh-r','sh-w'].forEach(function(id){document.getElementById(id).value='';});
  showNext();
}

function finishFull(){
  var dur=Math.round((Date.now()-ses.startTime)/60000);
  var rec={id:'w'+Date.now(),date:new Date().toISOString(),tmplId:ses.tmplId,tmplName:ses.tmplName,duration:dur,exercises:ses.exercises};
  H.unshift(rec);sv();
  var tw2=rec.exercises.reduce(function(a,e){return a+e.workSets;},0);
  var twm=rec.exercises.reduce(function(a,e){return a+e.warmSets;},0);
  document.getElementById('sum-content').innerHTML=
    '<div class="sgrid"><div class="scard"><div class="sval">'+dur+'</div><div class="slbl">минут</div></div><div class="scard"><div class="sval">'+rec.exercises.filter(function(e){return !e.skipped;}).length+'</div><div class="slbl">упражнений</div></div><div class="scard"><div class="sval">'+tw2+'</div><div class="slbl">рабочих подх.</div></div><div class="scard"><div class="sval">'+twm+'</div><div class="slbl">разминочных</div></div></div>'+
    rec.exercises.map(function(e){return '<div class="card" style="margin-bottom:10px"><div style="font-weight:700;margin-bottom:4px">'+ei(e.name)+' '+e.name+'</div>'+(e.skipped?'<div style="color:var(--muted);font-size:13px">Пропущено</div>':'<div style="font-size:13px;color:var(--muted)">'+e.workSets+' раб. × ~'+e.reps+' повт · '+e.weight+' кг'+(e.warmSets?' | '+e.warmSets+' разм.':'')+'</div>')+'</div>';}).join('')+
    '<button class="btn btn-blue" onclick="goHome()">На главную</button>';
  show('s-summary');
}

function startTimer(sec){timerRemain=sec;document.getElementById('tnum').textContent=sec;document.getElementById('tov').style.display='flex';clearInterval(timerInt);timerInt=setInterval(function(){timerRemain--;document.getElementById('tnum').textContent=timerRemain;if(timerRemain<=0)skipTimer();},1000);}
function skipTimer(){clearInterval(timerInt);document.getElementById('tov').style.display='none';}

function openStats(){
  var now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay());
  var tw3=H.reduce(function(a,w){return a+w.exercises.reduce(function(b,e){return b+e.workSets;},0);},0);
  var ec={};H.forEach(function(w){w.exercises.forEach(function(e){if(!e.skipped)ec[e.name]=(ec[e.name]||0)+1;});});
  var top=Object.entries(ec).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var streak=0;var dts=[...new Set(H.map(function(w){return new Date(w.date).toDateString();}))];var ck=new Date();
  while(dts.indexOf(ck.toDateString())>=0){streak++;ck.setDate(ck.getDate()-1);}
  document.getElementById('stats-content').innerHTML=
    '<div class="statgrid"><div class="statc"><div class="statv">'+H.length+'</div><div class="statl">тренировок</div></div><div class="statc"><div class="statv">'+H.filter(function(w){return new Date(w.date)>=ws;}).length+'</div><div class="statl">эта неделя</div></div><div class="statc"><div class="statv">'+tw3+'</div><div class="statl">рабочих подх.</div></div><div class="statc"><div class="statv">'+streak+'</div><div class="statl">дней подряд</div></div></div>'+
    '<div class="card"><div class="stitle" style="padding:0;margin:0 0 12px">Топ упражнений</div>'+
    (!top.length?'<div style="color:var(--muted);font-size:14px">Нет данных</div>':top.map(function(item){var n=item[0];var c=item[1];var p=Math.round((c/top[0][1])*100);return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:14px;font-weight:700">'+ei(n)+' '+n+'</span><span style="font-size:13px;color:var(--muted)">'+c+'×</span></div><div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+p+'%;background:var(--blue);border-radius:3px"></div></div></div>';}).join(''))+
    '</div>';
  show('s-stats');
}

// Init demo templates
if(!T.length){
  T=[
    {id:'t1',name:'Тяни',icon:'💪',exercises:[{name:'Становая тяга',sets:4,reps:5,weight:120},{name:'Тяга к поясу',sets:4,reps:8,weight:80},{name:'Подтягивания',sets:3,reps:8,weight:0},{name:'Бицепс со штангой',sets:3,reps:10,weight:40}]},
    {id:'t2',name:'Жми',icon:'🏋️',exercises:[{name:'Жим лёжа',sets:4,reps:5,weight:100},{name:'Жим стоя',sets:4,reps:8,weight:60},{name:'Разводка',sets:3,reps:12,weight:20},{name:'Трицепс на блоке',sets:3,reps:12,weight:30}]},
    {id:'t3',name:'Ноги',icon:'🦵',exercises:[{name:'Приседания',sets:4,reps:6,weight:100},{name:'Жим ногами',sets:3,reps:12,weight:150},{name:'Выпады',sets:3,reps:10,weight:40}]}
  ];
  sv();
}
goHome();
</script>
</body>
</html>
